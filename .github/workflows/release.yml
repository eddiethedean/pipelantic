name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish to PyPI
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(uv version --short)"
          MODULE_VERSION="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/pipelinemodel/_version.py)"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$MODULE_VERSION" ]; then
            echo "Version mismatch: tag='$TAG' pyproject='$VERSION' module='$MODULE_VERSION'"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Smoke test wheel
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          uv run --isolated --no-project --with dist/*.whl \
            python -c "import pipelinemodel; assert pipelinemodel.__version__ == '$TAG'"

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
