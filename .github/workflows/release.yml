name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish to PyPI
    needs: checks
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.3"
          python-version: "3.11"
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(uv version --short)"
          MODULE_VERSION="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/etlantic/_version.py)"
          POLARS_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-polars/pyproject.toml | head -1)"
          PANDAS_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-pandas/pyproject.toml | head -1)"
          SQL_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-sql/pyproject.toml | head -1)"
          SPARK_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-pyspark/pyproject.toml | head -1)"
          AIRFLOW_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-airflow/pyproject.toml | head -1)"
          PREFECT_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-prefect/pyproject.toml | head -1)"
          KEYRING_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-keyring/pyproject.toml | head -1)"
          SQLMODEL_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-sqlmodel/pyproject.toml | head -1)"
          SPARKFORGE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-sparkforge/pyproject.toml | head -1)"
          DATAFUSION_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' packages/etlantic-datafusion/pyproject.toml | head -1)"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$MODULE_VERSION" ]; then
            echo "Version mismatch: tag='$TAG' pyproject='$VERSION' module='$MODULE_VERSION'"
            exit 1
          fi
          if [ "$TAG" != "$POLARS_VERSION" ] || [ "$TAG" != "$PANDAS_VERSION" ] || [ "$TAG" != "$SQL_VERSION" ] || [ "$TAG" != "$SPARK_VERSION" ] || [ "$TAG" != "$AIRFLOW_VERSION" ] || [ "$TAG" != "$PREFECT_VERSION" ] || [ "$TAG" != "$KEYRING_VERSION" ] || [ "$TAG" != "$SQLMODEL_VERSION" ] || [ "$TAG" != "$SPARKFORGE_VERSION" ] || [ "$TAG" != "$DATAFUSION_VERSION" ]; then
            echo "Plugin version mismatch: tag='$TAG' polars='$POLARS_VERSION' pandas='$PANDAS_VERSION' sql='$SQL_VERSION' spark='$SPARK_VERSION' airflow='$AIRFLOW_VERSION' prefect='$PREFECT_VERSION' keyring='$KEYRING_VERSION' sqlmodel='$SQLMODEL_VERSION' sparkforge='$SPARKFORGE_VERSION' datafusion='$DATAFUSION_VERSION'"
            exit 1
          fi

      - name: Build
        run: |
          rm -rf dist
          mkdir -p dist
          uv build --package etlantic
          uv build --package etlantic-polars --out-dir dist
          uv build --package etlantic-pandas --out-dir dist
          uv build --package etlantic-sql --out-dir dist
          uv build --package etlantic-pyspark --out-dir dist
          uv build --package etlantic-airflow --out-dir dist
          uv build --package etlantic-prefect --out-dir dist
          uv build --package etlantic-keyring --out-dir dist
          uv build --package etlantic-sqlmodel --out-dir dist
          uv build --package etlantic-sparkforge --out-dir dist
          uv build --package etlantic-datafusion --out-dir dist
          ls -la dist/

      - name: Generate CycloneDX SBOMs
        run: |
          set -euo pipefail
          mkdir -p dist/sbom
          uv tool run cyclonedx-py environment \
            --output-format JSON \
            --outfile dist/sbom/etlantic-environment.cdx.json || true
          # Per-wheel SPDX-ish checksum manifest (always available).
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          dist = Path("dist")
          entries = []
          for path in sorted(dist.glob("*.whl")) + sorted(dist.glob("*.tar.gz")):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              entries.append({
                  "path": path.name,
                  "sha256": digest,
                  "bytes": path.stat().st_size,
              })
              path.with_suffix(path.suffix + ".sha256").write_text(
                  f"{digest}  {path.name}\n", encoding="utf-8"
              )
          Path("dist/sbom/release-artifacts.json").write_text(
              json.dumps({"schema": "etlantic.release_artifacts/1", "artifacts": entries}, indent=2) + "\n",
              encoding="utf-8",
          )
          print(f"wrote {len(entries)} artifact digests")
          PY

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Smoke test core wheel
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WHEEL="dist/etlantic-${TAG}-py3-none-any.whl"
          uv run --isolated --no-project --with "$WHEEL" \
            python -c "
          import etlantic
          assert etlantic.__version__ == '$TAG'
          import importlib.util
          assert importlib.util.find_spec('sqlalchemy') is None
          assert importlib.util.find_spec('psycopg') is None
          assert importlib.util.find_spec('pyspark') is None
          assert importlib.util.find_spec('airflow') is None
          assert importlib.util.find_spec('prefect') is None
          print('core ok, driver-free')
          "

      - name: Smoke discover plugins on installed wheels
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CORE="dist/etlantic-${TAG}-py3-none-any.whl"
          POLARS="dist/etlantic_polars-${TAG}-py3-none-any.whl"
          PANDAS="dist/etlantic_pandas-${TAG}-py3-none-any.whl"
          SQL="dist/etlantic_sql-${TAG}-py3-none-any.whl"
          SPARK="dist/etlantic_pyspark-${TAG}-py3-none-any.whl"
          AIRFLOW="dist/etlantic_airflow-${TAG}-py3-none-any.whl"
          PREFECT="dist/etlantic_prefect-${TAG}-py3-none-any.whl"
          KEYRING="dist/etlantic_keyring-${TAG}-py3-none-any.whl"
          SQLMODEL="dist/etlantic_sqlmodel-${TAG}-py3-none-any.whl"
          SPARKFORGE="dist/etlantic_sparkforge-${TAG}-py3-none-any.whl"
          DATAFUSION="dist/etlantic_datafusion-${TAG}-py3-none-any.whl"
          uv run --isolated --no-project \
            --with "$CORE" --with "$POLARS" --with "$PANDAS" --with "$SQL" \
            --with "$SPARK" --with "$AIRFLOW" --with "$PREFECT" --with "$KEYRING" \
            --with "$SQLMODEL" --with "$SPARKFORGE" --with "$DATAFUSION" \
            python -c "
          import etlantic
          import etlantic_polars
          import etlantic_pandas
          import etlantic_sql
          import etlantic_pyspark
          import etlantic_airflow
          import etlantic_prefect
          import etlantic_keyring
          import etlantic_sqlmodel
          import etlantic_sparkforge
          import etlantic_datafusion
          assert etlantic.__version__ == '$TAG'
          assert etlantic_polars.__version__ == '$TAG'
          assert etlantic_pandas.__version__ == '$TAG'
          assert etlantic_sql.__version__ == '$TAG'
          assert etlantic_pyspark.__version__ == '$TAG'
          assert etlantic_airflow.__version__ == '$TAG'
          assert etlantic_prefect.__version__ == '$TAG'
          assert etlantic_keyring.__version__ == '$TAG'
          assert etlantic_sqlmodel.__version__ == '$TAG'
          assert etlantic_sparkforge.__version__ == '$TAG'
          assert etlantic_datafusion.__version__ == '$TAG'
          from etlantic.dataframe.discovery import discover_dataframe_plugins
          from etlantic.sql.discovery import discover_sql_plugins
          from etlantic.spark.discovery import discover_spark_plugins
          from etlantic.orchestration.discovery import discover_orchestrator_plugins
          from etlantic.runtime.scheduler_discovery import discover_scheduler_plugins
          from etlantic.transform.discovery import discover_transform_compilers
          found = discover_dataframe_plugins()
          assert set(found) >= {'polars', 'pandas', 'datafusion'}, found
          sql = discover_sql_plugins()
          assert 'sql' in sql, sql
          spark = discover_spark_plugins()
          assert 'pyspark' in spark, spark
          orch = discover_orchestrator_plugins()
          assert 'airflow' in orch, orch
          sched = discover_scheduler_plugins()
          assert 'prefect' in sched, sched
          compilers = discover_transform_compilers()
          assert 'polars' in compilers, compilers
          assert 'pyspark' in compilers, compilers
          assert 'pandas' in compilers, compilers
          assert 'datafusion' in compilers, compilers
          print('ok', etlantic.__version__, sorted(found), sorted(sql), sorted(spark), sorted(orch), sorted(sched), sorted(compilers))
          "

      - name: Publish packages to PyPI (OIDC preferred, token fallback)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"

          # Prefer short-lived Trusted Publishing (OIDC). Fall back to the
          # repository token only when OIDC is not configured for a project.
          # Residual risk: long-lived tokens remain available as bootstrap.

          NEW_PROJECT_GAP_SECONDS=600
          RETRY_BASE_SECONDS=60
          new_projects_published=0

          pypi_project_exists() {
            local name="$1"
            local code
            code="$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/${name}/json")"
            [ "$code" = "200" ]
          }

          publish_pair() {
            local name="$1"
            local wheel="$2"
            local sdist="$3"
            local attempt=1
            local max_attempts=5
            local delay="$RETRY_BASE_SECONDS"
            local log=""
            local is_new=0
            local status=0

            if pypi_project_exists "$name"; then
              echo "PyPI project exists: $name (no new-project gap)"
            else
              is_new=1
              if [ "$new_projects_published" -gt 0 ]; then
                echo "Waiting ${NEW_PROJECT_GAP_SECONDS}s before creating new PyPI project: $name"
                sleep "$NEW_PROJECT_GAP_SECONDS"
              fi
              echo "Creating new PyPI project on first upload: $name"
            fi

            while true; do
              echo "Publishing $(basename "$wheel") (attempt $attempt/$max_attempts)"
              set +e
              # Try OIDC trusted publishing first (no token).
              log="$(uv publish --trusted-publishing always --check-url https://pypi.org/simple/ "$wheel" "$sdist" 2>&1)"
              status=$?
              if [ "$status" -ne 0 ] && [ -n "${UV_PUBLISH_TOKEN:-}" ]; then
                echo "OIDC publish unavailable; falling back to token for $name"
                log="$(uv publish --check-url https://pypi.org/simple/ "$wheel" "$sdist" 2>&1)"
                status=$?
              fi
              set -e
              printf '%s\n' "$log"
              if [ "$status" -eq 0 ]; then
                if [ "$is_new" -eq 1 ]; then
                  new_projects_published=$((new_projects_published + 1))
                fi
                return 0
              fi
              if printf '%s' "$log" | grep -Eiq \
                'file already exists|already uploaded|skipping.*already'; then
                echo "Already published; continuing: $(basename "$wheel")"
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Publish failed after $max_attempts attempts: $wheel"
                echo "If this is a new-project 429, wait for the rolling hour window and re-run."
                exit 1
              fi
              if ! printf '%s' "$log" | grep -Eiq \
                '429|too many|rate limit|timeout|temporar|connection'; then
                echo "Non-retryable publish failure for $(basename "$wheel")"
                exit 1
              fi
              echo "Publish failed; waiting ${delay}s before retry..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          publish_pair etlantic \
            "dist/etlantic-${TAG}-py3-none-any.whl" \
            "dist/etlantic-${TAG}.tar.gz"
          publish_pair etlantic-polars \
            "dist/etlantic_polars-${TAG}-py3-none-any.whl" \
            "dist/etlantic_polars-${TAG}.tar.gz"
          publish_pair etlantic-pandas \
            "dist/etlantic_pandas-${TAG}-py3-none-any.whl" \
            "dist/etlantic_pandas-${TAG}.tar.gz"
          publish_pair etlantic-sql \
            "dist/etlantic_sql-${TAG}-py3-none-any.whl" \
            "dist/etlantic_sql-${TAG}.tar.gz"
          publish_pair etlantic-pyspark \
            "dist/etlantic_pyspark-${TAG}-py3-none-any.whl" \
            "dist/etlantic_pyspark-${TAG}.tar.gz"
          publish_pair etlantic-airflow \
            "dist/etlantic_airflow-${TAG}-py3-none-any.whl" \
            "dist/etlantic_airflow-${TAG}.tar.gz"
          publish_pair etlantic-keyring \
            "dist/etlantic_keyring-${TAG}-py3-none-any.whl" \
            "dist/etlantic_keyring-${TAG}.tar.gz"
          publish_pair etlantic-sqlmodel \
            "dist/etlantic_sqlmodel-${TAG}-py3-none-any.whl" \
            "dist/etlantic_sqlmodel-${TAG}.tar.gz"
          publish_pair etlantic-prefect \
            "dist/etlantic_prefect-${TAG}-py3-none-any.whl" \
            "dist/etlantic_prefect-${TAG}.tar.gz"
          publish_pair etlantic-sparkforge \
            "dist/etlantic_sparkforge-${TAG}-py3-none-any.whl" \
            "dist/etlantic_sparkforge-${TAG}.tar.gz"
          publish_pair etlantic-datafusion \
            "dist/etlantic_datafusion-${TAG}-py3-none-any.whl" \
            "dist/etlantic_datafusion-${TAG}.tar.gz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          python3 - "$VER" <<'PY' > /tmp/release-notes.md
          import re
          import sys
          from pathlib import Path

          tag = sys.argv[1]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(tag)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, text, flags=re.M | re.S)
          body = match.group(0).strip() if match else f"ETLantic {tag}"
          print(body)
          PY
          assets=(dist/etlantic-${VER}-py3-none-any.whl dist/etlantic-${VER}.tar.gz)
          if [ -f dist/sbom/release-artifacts.json ]; then
            assets+=(dist/sbom/release-artifacts.json)
          fi
          if [ -f dist/sbom/etlantic-environment.cdx.json ]; then
            assets+=(dist/sbom/etlantic-environment.cdx.json)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "ETLantic ${VER}" \
              --notes-file /tmp/release-notes.md \
              "${assets[@]}"
          fi
