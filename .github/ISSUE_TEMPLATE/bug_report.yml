name: Bug report
description: Report incorrect shipped behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Never include credentials, production data, or private plans.
  - type: input
    id: version
    attributes:
      label: ETLantic version
      placeholder: "0.12.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Prefer a public example or short script.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / diagnostics
      description: Paste non-secret JSON/SARIF codes when possible.
    validations:
      required: true
