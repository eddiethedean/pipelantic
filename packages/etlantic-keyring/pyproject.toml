[project]
name = "etlantic-keyring"
version = "0.9.0"
description = "OS keyring secret provider for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.9.0,<1.0",
    "keyring",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_keyring"]
