[project]
name = "etlantic-sparkforge"
version = "0.10.0"
description = "SparkForge-to-ETLantic migration adapter (medallion facade mapping)."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.10.0,<1.0",
]

# Live SparkForge (`pipeline_builder`) bridging is optional and resolved
# only when that package is installed in the environment. IR fixture tests
# do not require it.

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_sparkforge"]
