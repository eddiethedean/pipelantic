[project]
name = "etlantic-polars"
version = "0.10.0"
description = "Polars dataframe execution plugin for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.10.0,<1.0",
    "polars>=1.0,<2",
]

[project.optional-dependencies]
arrow = ["pyarrow>=14"]

[project.entry-points."etlantic.dataframe_plugins"]
polars = "etlantic_polars:create_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_polars"]
