[project]
name = "etlantic-airflow"
version = "0.10.0"
description = "Airflow reference orchestrator compiler for ETLantic."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Odo Matthews", email = "odosmatthews@gmail.com" }]
dependencies = [
    "etlantic>=0.10.0,<1.0",
]

[project.entry-points."etlantic.orchestrator_plugins"]
airflow = "etlantic_airflow:create_plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/etlantic_airflow"]
