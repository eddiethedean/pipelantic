version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  commands:
    - pip install --upgrade pip setuptools wheel
    - pip install -r docs/requirements.txt
    - pip install .
    # Build docs with strict validation (suppresses Material MkDocs 2.0 advisory).
    - python scripts/build_docs.py --site-dir $READTHEDOCS_OUTPUT/html
